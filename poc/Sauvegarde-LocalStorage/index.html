<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartes à Collectionner - PixiJS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 2.5em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .btn-load {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-save {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-reset {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cards-section {
            flex: 1;
            min-width: 300px;
        }

        #gameCanvas {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: #1a1a2e;
            width: 100%;
        }

        .collection-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            min-width: 350px;
            max-width: 400px;
        }

        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .collection-header h2 {
            color: white;
            font-size: 1.8em;
            margin: 0;
        }

        .collection-stats {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .collection-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .collection-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        .collection-card.obtained {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4) 0%, rgba(139, 195, 74, 0.4) 100%);
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .collection-card.locked {
            background: rgba(50, 50, 50, 0.4);
            border-color: rgba(100, 100, 100, 0.5);
            opacity: 0.6;
        }

        .card-id {
            font-weight: bold;
            color: white;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .card-name {
            font-size: 11px;
            color: white;
            word-wrap: break-word;
            line-height: 1.2;
        }

        .card-rarity {
            font-size: 10px;
            margin-top: 5px;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .rarity-legendary {
            background: #FFD700;
            color: #000;
        }

        .rarity-epic {
            background: #A020F0;
            color: #FFF;
        }

        .rarity-rare {
            background: #4169E1;
            color: #FFF;
        }

        .obtained-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #4CAF50;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .locked-icon {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.3);
        }

        .info {
            color: white;
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .info p {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.6;
        }

        /* Scrollbar personnalisée */
        .collection-grid::-webkit-scrollbar {
            width: 8px;
        }

        .collection-grid::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .collection-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .collection-grid::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .btn {
                padding: 12px 24px;
                font-size: 16px;
            }

            .main-content {
                flex-direction: column;
            }

            .collection-section {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Cartes à Collectionner</h1>
        
        <div class="controls">
            <button id="loadButton" class="btn btn-load">📂 Tirer 5 Cartes</button>
            <button id="saveButton" class="btn btn-save">💾 Sauvegarder</button>
            <button id="resetButton" class="btn btn-reset">🔄 Réinitialiser Collection</button>
        </div>
        
        <div class="main-content">
            <div class="cards-section">
                <div id="gameCanvas"></div>
            </div>
            
            <div class="collection-section">
                <div class="collection-header">
                    <h2>📚 Ma Collection</h2>
                    <div class="collection-stats" id="collectionStats">0/20</div>
                </div>
                <div class="collection-grid" id="collectionGrid"></div>
            </div>
        </div>
        
        <div class="info">
            <p>📂 Cliquez sur "Tirer 5 Cartes" pour obtenir 5 cartes aléatoires</p>
            <p>📚 Votre collection se remplit automatiquement avec les cartes obtenues</p>
            <p>💾 Sauvegardez votre progression dans le localStorage</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
