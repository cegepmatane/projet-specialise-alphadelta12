<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartes à Collectionner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cartes à Collectionner</h1>
        
        <div class="controls">
            <button id="loadButton" class="btn btn-load">Tirer 5 Cartes</button>
            <button id="saveButton" class="btn btn-save">Sauvegarder</button>
            <button id="resetButton" class="btn btn-reset">Réinitialiser Collection</button>
        </div>
        
        <div class="main-content">
            <div class="cards-section">
                <div id="gameCanvas"></div>
            </div>
            
            <div class="collection-section">
                <div class="collection-header">
                    <h2>Ma Collection</h2>
                    <div class="collection-stats" id="collectionStats">0/20</div>
                </div>
                <div class="collection-grid" id="collectionGrid"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
